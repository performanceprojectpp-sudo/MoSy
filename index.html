      </div>
      <div><label style="margin-top:8px">Note</label><textarea id="ft-notes" rows="2" style="resize:vertical"></textarea></div>
    `;
    setTimeout(()=>{
      const upd=()=>{
        let tot=0;
        for(let i=0;i<12;i+=2){
          const a=+document.getElementById(`ft-fms-${i}`)?.value||0;
          const b=+document.getElementById(`ft-fms-${i+1}`)?.value;
          // per i test bilaterali (hurdle, lunge, shoulder, ASLR, rotary) prendo il minimo dei due lati come da protocollo FMS originale
          if(!isNaN(b)){tot+=Math.min(a,b);}
          else{tot+=a;} // deep squat e trunk stability sono unici
        }
        // Ricalcolo corretto: Deep Squat(idx0) + min(Hurdle L/R)(1,2) + min(Lunge L/R)(3,4) + min(Shoulder L/R)(5,6) + min(ASLR L/R)(7,8) + TrunkPushUp(9) + min(Rotary L/R)(10,11)
        const v=i=>+document.getElementById(`ft-fms-${i}`)?.value||0;
        const total = v(0) + Math.min(v(1),v(2)) + Math.min(v(3),v(4)) + Math.min(v(5),v(6)) + Math.min(v(7),v(8)) + v(9) + Math.min(v(10),v(11));
        const el=document.getElementById('ft-fms-total');
        if(el){el.textContent=total; el.style.color = total<=14?'var(--erT)':'var(--okT)';}
      };
      for(let i=0;i<12;i++) document.getElementById(`ft-fms-${i}`)?.addEventListener('change',upd);
      upd();
    },50);

      <div class="grid2" style="gap:10px">

        <input id="ft-yb-r-pm" type="number" placeholder="Postero-Mediale" step="0.5">

function saveFunctionalTest(){
  const cat = document.getElementById('ft-cat')?.value || 'faber';
  const def = FT_DEFINITIONS[cat];
  const aid = document.getElementById('ft-ath')?.value;
  const date = document.getElementById('ft-date')?.value || today();
  const notes = document.getElementById('ft-notes')?.value || '';
  let resultData = {}, resultSummary = '';

  if(def.resultType === 'side_positive_negative'){
    const r = document.getElementById('ft-right')?.value;
    const l = document.getElementById('ft-left')?.value;
    resultData = {right:r, left:l};
    const lbl = v=>v==='positive'?'Positivo':v==='negative'?'Negativo':'N/T';
    resultSummary = `Dx: ${lbl(r)} · Sx: ${lbl(l)}`;
  } else if(def.resultType === 'fms'){
    const v = i=>+document.getElementById(`ft-fms-${i}`)?.value||0;
    const total = v(0) + Math.min(v(1),v(2)) + Math.min(v(3),v(4)) + Math.min(v(5),v(6)) + Math.min(v(7),v(8)) + v(9) + Math.min(v(10),v(11));
    const scores = [];
    for(let i=0;i<12;i++) scores.push(v(i));
    resultData = {scores, total};
    resultSummary = `Score: ${total}/21 ${total<=14?'⚠️':''}`;
  } else if(def.resultType === 'ybalance'){
    const llR=+document.getElementById('ft-yb-leglenR')?.value||1;
    const llL=+document.getElementById('ft-yb-leglenL')?.value||1;
    const rAnt=+document.getElementById('ft-yb-r-ant')?.value||0, rPm=+document.getElementById('ft-yb-r-pm')?.value||0, rPl=+document.getElementById('ft-yb-r-pl')?.value||0;
    const lAnt=+document.getElementById('ft-yb-l-ant')?.value||0, lPm=+document.getElementById('ft-yb-l-pm')?.value||0, lPl=+document.getElementById('ft-yb-l-pl')?.value||0;
    const compR = ((rAnt+rPm+rPl)/(3*llR))*100;
    const compL = ((lAnt+lPm+lPl)/(3*llL))*100;
    resultData = {legLenR:llR, legLenL:llL, rAnt,rPm,rPl, lAnt,lPm,lPl, compR, compL};
    resultSummary = `Dx ${compR.toFixed(0)}% · Sx ${compL.toFixed(0)}%`;
  } else {
    const name = document.getElementById('ft-custom-name')?.value || 'Test personalizzato';
    const result = document.getElementById('ft-custom-result')?.value || '';
    resultData = {customName:name, customResult:result};
    resultSummary = result || '—';
  }

  if(!S.functionalTests)S.functionalTests=[];
  S.functionalTests.push({
    id:rid(), athleteId:aid, athleteName:athName(aid), date,
    testCategory:cat, testLabel: cat==='custom'?(resultData.customName||'Personalizzato'):def.label,
    resultData, resultSummary, notes
  });
  save();
  alert('✅ Test salvato!');
  render('functional');
}

function estimateMET(rpe){
  if(rpe<=2) return 2.5;
  if(rpe<=4) return 4.5;
  if(rpe<=6) return 7;
  if(rpe<=8) return 9;
  return 11;
}

function estimateSessionEE(massKg, durationMin, rpe){
  const met = estimateMET(rpe);
  return (met * massKg / 60) * durationMin;
}

function updRomeiStats(){
  const aid = document.getElementById('romei-ath')?.value;
  const athlete = S.athletes.find(a=>a.id===aid);
  const sessions = S.tlm.filter(e=>e.athleteId===aid && e.duration>0 && e.rpe>0);
  const el = document.getElementById('romei-stats');
  if(el){
    el.innerHTML = `<div class="grid2" style="gap:8px">
      ${mC(currentLang==='en'?'Available sessions':'Sessioni disponibili',sessions.length)}
      ${mC(currentLang==='en'?'Body weight':'Peso corporeo',athlete?athlete.weight+'kg':'—')}
    </div>
    ${sessions.length<5?`<p style="font-size:11px;color:var(--erT);margin-top:8px">⚠️ Servono almeno 5 sessioni con durata e RPE per una regressione affidabile (attualmente ${sessions.length}).</p>`:''}`;
  }
}

function linearRegressionSEE(points, xKey, yKey){
  const n = points.length;
  const sumX = points.reduce((s,p)=>s+p[xKey],0);
  const sumY = points.reduce((s,p)=>s+p[yKey],0);
  const sumXY = points.reduce((s,p)=>s+p[xKey]*p[yKey],0);
  const sumX2 = points.reduce((s,p)=>s+p[xKey]*p[xKey],0);
  const denom = (n*sumX2 - sumX*sumX);
  if(Math.abs(denom)<1e-9) return null;
  const slope = (n*sumXY - sumX*sumY) / denom;
  const intercept = (sumY - slope*sumX) / n;
  const predicted = points.map(p=>slope*p[xKey]+intercept);
  const residuals = points.map((p,i)=>p[yKey]-predicted[i]);
  const ssRes = residuals.reduce((s,r)=>s+r*r,0);
  const see = n>2 ? Math.sqrt(ssRes/(n-2)) : 0;
  const meanY = sumY/n;
  const ssTot = points.reduce((s,p)=>s+Math.pow(p[yKey]-meanY,2),0);
  const r2 = ssTot>0 ? 1-(ssRes/ssTot) : 1;
  return {slope, intercept, see, r2, residuals};
}

function calcRomei(){
  const aid = document.getElementById('romei-ath')?.value;
  const athlete = S.athletes.find(a=>a.id===aid);
  if(!athlete){alert('Seleziona un atleta');return;}
  const sessions = S.tlm.filter(e=>e.athleteId===aid && e.duration>0 && e.rpe>0)
    .sort((a,b)=>a.date.localeCompare(b.date));

  if(sessions.length<5){
    document.getElementById('romei-result').innerHTML = `<p style="font-size:12px;color:var(--erT)">${currentLang==='en'?'At least 5 sessions with duration and RPE recorded for this athlete.':'Servono almeno 5 sessioni con durata e RPE registrati per questo atleta.'}</p>`;
    document.getElementById('romei-chart').innerHTML = '';
    document.getElementById('romei-sessions-table').innerHTML = '';
    return;
  }

  const points = sessions.map(e=>({
    date: e.date,
    ee: estimateSessionEE(athlete.weight, e.duration, e.rpe),
    srpe: e.srpe,
    type: e.type||'—'
  }));

  const reg = linearRegressionSEE(points, 'ee', 'srpe');
  if(!reg){
    document.getElementById('romei-result').innerHTML = `<p style="font-size:12px;color:var(--erT)">${currentLang==='en'?'Unable to calculate regression (data insufficiently variable).':'Impossibile calcolare la regressione (dati insufficientemente variabili).'}</p>`;
    return;
  }

  const _enRes=currentLang==='en';
  document.getElementById('romei-result').innerHTML = `
    <div class="grid2" style="gap:8px;margin-bottom:10px">
      ${mC('Slope (m)','<span>'+reg.slope.toFixed(3)+'</span>','sRPE/kcal','var(--pu)')}
      ${mC(_enRes?'Intercept':'Intercetta','<span>'+reg.intercept.toFixed(1)+'</span>','')}
      ${mC('SEE','<span>'+reg.see.toFixed(1)+'</span>','sRPE')}
      ${mC('R²','<span>'+reg.r2.toFixed(3)+'</span>','')}
    </div>
    <p style="font-size:11px;color:var(--tx2);line-height:1.6">${_enRes?'Equation':'Equazione'}: sRPE = ${reg.slope.toFixed(3)} × EE + ${reg.intercept.toFixed(1)}. ${reg.r2<0.5?(_enRes?'⚠️ Low R²: weak individual relationship, interpret bands with caution.':'⚠️ R² basso: la relazione individuale è debole, interpretare le bande con cautela.'):(_enRes?'Solid individual relationship (R²≥0.5).':'Relazione individuale solida (R²≥0.5).')}</p>
  `;

  document.getElementById('romei-chart').innerHTML = renderRomeiChart(points, reg);

  const outliers = points.map((p,i)=>{
    const predicted = reg.slope*p.ee + reg.intercept;
    const residual = p.srpe - predicted;
    const z = reg.see>0 ? residual/reg.see : 0;
    return {...p, predicted, residual, z};
  });

  document.getElementById('romei-sessions-table').innerHTML = tbl(
    currentLang==='en'?['Date','Type','EE (kcal)','Actual sRPE','Expected sRPE','Deviation (z)','Status']:['Data','Tipo','EE (kcal)','sRPE reale','sRPE atteso','Scostamento (z)','Stato'],
    outliers.slice().reverse().map(o=>{
      const absZ = Math.abs(o.z);
      const _enR=currentLang==='en';
      const status = absZ>2 ? bdg(o.z>0?(_enR?'⚠️ Well above expected':'⚠️ Molto sopra atteso'):(_enR?'⚠️ Well below expected':'⚠️ Molto sotto atteso'),'er')
        : absZ>1 ? bdg(_enR?'Moderate deviation':'Moderato scostamento','wa')
        : bdg(_enR?'Within norm':'Nella norma','ok');
      return [o.date, o.type, o.ee.toFixed(0), o.srpe, o.predicted.toFixed(0), o.z.toFixed(2), status];
    })
  );
}

function renderRomeiChart(points, reg){
  const W=360,H=240,padL=46,padB=30,padT=14,padR=14;
  const chartW=W-padL-padR, chartH=H-padT-padB;
  const maxEE = Math.max(...points.map(p=>p.ee))*1.1;
  const maxSrpe = Math.max(...points.map(p=>p.srpe), reg.slope*maxEE+reg.intercept+2*reg.see)*1.1;
  const xScale = ee=>padL+(ee/maxEE)*chartW;
  const yScale = srpe=>padT+chartH-(Math.max(0,srpe)/maxSrpe)*chartH;

  let svg = `<svg viewBox="0 0 ${W} ${H}" style="width:100%;max-width:420px;height:auto">`;
  svg += `<line x1="${padL}" y1="${padT+chartH}" x2="${padL+chartW}" y2="${padT+chartH}" stroke="var(--bd2)" stroke-width="1"/>`;
  svg += `<line x1="${padL}" y1="${padT+chartH}" x2="${padL}" y2="${padT}" stroke="var(--bd2)" stroke-width="1"/>`;
  for(let i=0;i<=5;i++){
    const val=(maxEE*i/5);
    const x=xScale(val);
    svg += `<line x1="${x}" y1="${padT+chartH}" x2="${x}" y2="${padT+chartH+4}" stroke="var(--bd2)" stroke-width="1"/>`;
    svg += `<text x="${x}" y="${padT+chartH+15}" font-size="8" fill="var(--tx2)" text-anchor="middle">${val.toFixed(0)}</text>`;
  }
  for(let i=0;i<=5;i++){
    const val=(maxSrpe*i/5);
    const y=yScale(val);
    svg += `<line x1="${padL-4}" y1="${y}" x2="${padL}" y2="${y}" stroke="var(--bd2)" stroke-width="1"/>`;
    svg += `<text x="${padL-7}" y="${y+3}" font-size="8" fill="var(--tx2)" text-anchor="end">${val.toFixed(0)}</text>`;
  }
  svg += `<text x="${padL+chartW/2}" y="${H-4}" font-size="9" fill="var(--tx2)" text-anchor="middle">${currentLang==='en'?'Estimated EE (kcal)':'EE stimata (kcal)'}</text>`;
  svg += `<text x="10" y="${padT+chartH/2}" font-size="9" fill="var(--tx2)" text-anchor="middle" transform="rotate(-90 10 ${padT+chartH/2})">sRPE (AU)</text>`;

  // Bande +/-2 SEE e +/-1 SEE
  const x1=0, x2=maxEE;
  const yLine1=reg.slope*x1+reg.intercept, yLine2=reg.slope*x2+reg.intercept;
  const ySee2Hi1=yLine1+2*reg.see, ySee2Hi2=yLine2+2*reg.see;
  const ySee2Lo1=yLine1-2*reg.see, ySee2Lo2=yLine2-2*reg.see;
  const ySee1Hi1=yLine1+reg.see, ySee1Hi2=yLine2+reg.see;
  const ySee1Lo1=yLine1-reg.see, ySee1Lo2=yLine2-reg.see;

  // Banda ±2 SEE
  svg += `<polygon points="${xScale(x1)},${yScale(ySee2Hi1)} ${xScale(x2)},${yScale(ySee2Hi2)} ${xScale(x2)},${yScale(ySee2Lo2)} ${xScale(x1)},${yScale(ySee2Lo1)}" fill="var(--pu)" opacity="0.08"/>`;
  // Banda ±1 SEE
  svg += `<polygon points="${xScale(x1)},${yScale(ySee1Hi1)} ${xScale(x2)},${yScale(ySee1Hi2)} ${xScale(x2)},${yScale(ySee1Lo2)} ${xScale(x1)},${yScale(ySee1Lo1)}" fill="var(--pu)" opacity="0.15"/>`;

  // Retta di regressione
  svg += `<line x1="${xScale(x1)}" y1="${yScale(yLine1)}" x2="${xScale(x2)}" y2="${yScale(yLine2)}" stroke="var(--pu)" stroke-width="2"/>`;

  // Punti sessione, colorati per outlier
  points.forEach(p=>{
    const predicted = reg.slope*p.ee+reg.intercept;
    const z = reg.see>0 ? (p.srpe-predicted)/reg.see : 0;
    const color = Math.abs(z)>2 ? '#e31e24' : Math.abs(z)>1 ? '#f59e0b' : '#059669';
    svg += `<circle cx="${xScale(p.ee)}" cy="${yScale(p.srpe)}" r="4" fill="${color}" stroke="#fff" stroke-width="1"/>`;
  });

  const _enChart=currentLang==='en';
  svg += `<rect x="${W-150}" y="10" width="10" height="10" fill="#059669"/><text x="${W-135}" y="19" font-size="8" fill="var(--tx2)">${_enChart?'Within norm':'Nella norma'}</text>`;
  svg += `<rect x="${W-150}" y="23" width="10" height="10" fill="#f59e0b"/><text x="${W-135}" y="32" font-size="8" fill="var(--tx2)">${_enChart?'Moderate deviation':'Scostamento moderato'}</text>`;
  svg += `<rect x="${W-150}" y="36" width="10" height="10" fill="#e31e24"/><text x="${W-135}" y="45" font-size="8" fill="var(--tx2)">${_enChart?'Outside ±2 SEE':'Fuori ±2 SEE'}</text>`;
  svg += '</svg>';
  return svg;
}

// Genera una riga di tabella cliccabile con onclick personalizzato.
// Usa lo stesso stile della funzione tbl() esistente ma aggiunge cursore e handler.
function tblClickable(heads, rowsWithHandlers, emptyMsg){
  // rowsWithHandlers: array di {cells: [...], onclick: 'nomeFunzione(\"id\")'}
  const th = heads.map(h=>`<th>${h}</th>`).join('');
  const tr = rowsWithHandlers.length===0
    ? `<tr><td colspan="${heads.length}" style="text-align:center;padding:16px;color:var(--tx2)">${emptyMsg||'Nessun dato'}</td></tr>`
    : rowsWithHandlers.map(r=>`<tr class="row-clickable" onclick="${r.onclick}">${r.cells.map(c=>`<td>${c??'—'}</td>`).join('')}</tr>`).join('');
  return `<div class="tbl-wrap"><table><thead><tr>${th}</tr></thead><tbody>${tr}</tbody></table></div>`;
}
</script>
